# Companies Act, 2013 — key sections
# Source: mca.gov.in · verified text as of 2024 amendments.

source: "Companies Act, 2013"
sourceShort: "CA 2013"
jurisdiction: "india"
sourceUrl: "https://www.mca.gov.in/"
tags: [companies-act, corporate-law, governance]

sections:
  - code: "2(20)"
    title: "Definition of Company"
    content: |
      Section 2(20) defines a "company" as a company incorporated under the Companies Act,
      2013, or under any previous company law. The Act recognises several classes:

      - Public company (Section 2(71)): Not a private company, minimum 7 members, no
        restriction on transfer of shares, minimum paid-up capital as prescribed.
      - Private company (Section 2(68)): Restricts transfer of shares, limits members to
        200, prohibits invitation to the public.
      - One Person Company (Section 2(62)): Has only one person as a member.
      - Small company (Section 2(85)): Paid-up capital ≤ ₹4 crore AND turnover ≤ ₹40
        crore (thresholds revised FY 2023-24).
      - Section 8 company: Formed for promoting commerce, art, science, sports,
        education, research, social welfare — profits applied only for its objects,
        no dividend to members.

  - code: "135"
    title: "Corporate Social Responsibility (CSR)"
    content: |
      Section 135 mandates CSR for every company having:
      - Net worth ≥ ₹500 crore, OR
      - Turnover ≥ ₹1,000 crore, OR
      - Net profit ≥ ₹5 crore
      during the immediately preceding financial year.

      Requirements:
      - Constitute a CSR Committee of the Board (≥ 3 directors, at least 1 independent)
      - Spend at least 2% of average net profits of the preceding 3 financial years on
        CSR activities listed in Schedule VII (eradicating hunger, education, healthcare,
        environmental sustainability, rural development, etc.)
      - Unspent amounts must be transferred to a specified fund (like PM CARES) within
        6 months of the financial year end, OR to an Unspent CSR Account if the
        activity is ongoing.
      - Failure to spend attracts penalty: twice the unspent amount or ₹1 crore,
        whichever is less.

  - code: "139"
    title: "Appointment of Auditors"
    content: |
      Section 139 governs appointment of statutory auditors.

      Listed companies and prescribed classes of companies:
      - An individual auditor: maximum 1 term of 5 consecutive years
      - An audit firm: maximum 2 terms of 5 consecutive years (10 years total)
      - After the maximum, cooling-off of 5 years before re-appointment

      Other companies:
      - Auditor appointed at first AGM holds office till the 6th AGM (subject to
        ratification at each AGM until the 2017 amendment removed the ratification
        requirement).

      Casual vacancy: Filled by the Board within 30 days; if due to resignation, the
      appointment requires approval at a general meeting within 3 months.

      First auditor: Appointed by the Board within 30 days of incorporation.

  - code: "149"
    title: "Board of Directors — Composition"
    content: |
      Section 149 prescribes board composition:
      - Minimum 3 directors for a public company
      - Minimum 2 directors for a private company
      - Minimum 1 director for OPC
      - Maximum 15 directors (can be increased by special resolution)

      Mandatory categories:
      - Every listed public company: at least 1/3 of the total number of directors as
        independent directors.
      - Every company (public + private) falling under prescribed thresholds: at least
        1 woman director. Listed companies also require at least 1 independent
        woman director.
      - Every company: at least 1 director who has stayed in India for at least 182
        days in the financial year (resident director).

      An independent director:
      - Is not a promoter and not related to promoters/directors
      - Has no material pecuniary relationship with the company
      - Holds no shares in the company (nominal holdings permitted)
      - Is not a key managerial personnel or employee (or their relatives)

  - code: "177"
    title: "Audit Committee"
    content: |
      Section 177 requires every listed public company and prescribed classes of public
      companies (paid-up capital ≥ ₹10 crore, turnover ≥ ₹100 crore, or aggregate
      outstanding loans/borrowings/deposits ≥ ₹50 crore) to constitute an Audit
      Committee.

      Composition:
      - Minimum 3 directors
      - Majority of them independent directors
      - Majority members (including chairperson) must be able to read and understand
        financial statements

      Mandatory functions:
      - Recommend appointment, remuneration, and terms of the auditor
      - Review and monitor the auditor's independence, performance, and effectiveness
      - Examine financial statements and auditor's report
      - Approve / modify transactions with related parties
      - Evaluate internal financial controls and risk management systems
      - Monitor the end use of funds raised through public offers
      - Vigil mechanism (whistleblower) oversight
