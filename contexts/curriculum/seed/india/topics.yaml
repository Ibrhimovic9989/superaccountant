# SuperAccountant — India Track ("Chartered Path")
# Edited by CCO. Schema: docs/curriculum-pipeline.md
#
# Notes:
# - Each lesson auto-generates video, MDX, flowchart, mindmap, MCQ + scenario + Tally exercise.
# - Do NOT list "Module Introduction" / "Video Based" / "Tally Practice" as lessons — the pipeline produces them.
# - Phase 0 = Entry Test (adaptive, generated separately from a question bank derived from these objectives).
# - Sources left empty → ResearchTopicTool sources via Perplexity.

track: india
title:
  en: Chartered Path — Accounting for the Indian Market
  ar: المسار المعتمد — المحاسبة للسوق الهندي

phases:
  # ════════════════════════════════════════════════════════════
  - phase: 1
    title:
      en: Foundation
      ar: الأساسيات
    modules:
      - module: Introduction to Accounting
        lessons:
          - slug: in-intro-what-is-accounting
            title:
              en: What is Accounting? Purpose, Scope and Why It Matters
              ar: ما هي المحاسبة؟ الغرض والنطاق وأهميتها
            learning_objectives:
              - Define accounting as a system of identifying, recording, and communicating financial information
              - Distinguish accounting from bookkeeping
              - Explain why every business — from kirana store to listed company — needs accounting
          - slug: in-intro-accounting-activities
            title:
              en: Core Accounting Activities and the Information Flow
              ar: الأنشطة المحاسبية الأساسية وتدفق المعلومات
            learning_objectives:
              - List the four core activities (record, classify, summarise, interpret)
              - Trace how a single transaction flows from source document to financial statement
          - slug: in-intro-stakeholders-and-objectives
            title:
              en: Users of Accounting Information and the Objectives of Accounting
              ar: مستخدمو المعلومات المحاسبية وأهداف المحاسبة
            learning_objectives:
              - Identify internal vs external users (owners, lenders, regulators, employees, tax authorities)
              - "State the four objectives: record-keeping, decision-making, compliance, stewardship"

      - module: Fundamental Concepts
        lessons:
          - slug: in-fund-accounting-cycle
            title:
              en: The Accounting Cycle End-to-End
              ar: دورة المحاسبة من البداية إلى النهاية
            learning_objectives:
              - List the 8 steps of the accounting cycle
              - Map each step to its output document
          - slug: in-fund-principles-and-conventions
            title:
              en: Accounting Principles, Concepts and Conventions
              ar: المبادئ والمفاهيم والاتفاقيات المحاسبية
            learning_objectives:
              - Explain entity, going-concern, accrual, matching, prudence, consistency
              - Apply each concept to a real example
          - slug: in-fund-elements
            title:
              en: Elements of Accounting — Assets, Liabilities, Capital, Income, Expense
              ar: عناصر المحاسبة — الأصول والخصوم ورأس المال والدخل والمصروفات
            learning_objectives:
              - Define each element with examples relevant to Indian SMEs
              - Build the accounting equation and prove it always balances
          - slug: in-fund-double-entry
            title:
              en: Double-Entry System and the Golden Rules
              ar: نظام القيد المزدوج والقواعد الذهبية
            learning_objectives:
              - State the three golden rules (personal, real, nominal)
              - Apply golden rules to common transactions

      - module: Vouchers and Source Documents
        lessons:
          - slug: in-voucher-source-documents
            title:
              en: Source Documents — Invoices, Receipts, Bills, Contracts
              ar: المستندات المصدرية — الفواتير والإيصالات والعقود
            learning_objectives:
              - Identify the source document for each common transaction type
              - Explain why source documents are the legal anchor of an entry
          - slug: in-voucher-types
            title:
              en: Voucher Types — Receipt, Payment, Journal, Contra, Sales, Purchase
              ar: أنواع السندات — قبض ودفع ويومية ومقابل وبيع وشراء
            learning_objectives:
              - Pick the correct voucher type for any given transaction
              - Prepare each voucher with all mandatory fields
          - slug: in-voucher-debit-credit-notes
            title:
              en: Debit Notes, Credit Notes and Delivery Challans
              ar: إشعارات الخصم والائتمان وأوامر التسليم
            learning_objectives:
              - Distinguish a debit note from a credit note
              - Explain when to issue a delivery challan vs a tax invoice

      - module: Book Keeping
        lessons:
          - slug: in-bk-importance-and-process
            title:
              en: Why Book-Keeping Matters and the Book-Keeping Process
              ar: أهمية مسك الدفاتر وعملية المسك
            learning_objectives:
              - Articulate three legal and three managerial reasons for book-keeping
              - Walk through the steps from voucher to ledger
          - slug: in-bk-classification-of-accounts
            title:
              en: Classification of Accounts — Personal, Real, Nominal
              ar: تصنيف الحسابات — شخصية وحقيقية واسمية
            learning_objectives:
              - Classify any account into the right category
              - Apply the right golden rule based on classification
          - slug: in-bk-record-retention-india
            title:
              en: Record Retention Rules in India (Companies Act, IT Act, GST Act)
              ar: قواعد الاحتفاظ بالسجلات في الهند
            learning_objectives:
              - State the retention period under each statute (8 yrs Companies Act, 6 yrs IT Act, 6 yrs GST)
              - Identify which records must be retained in physical vs digital form

      - module: Accounting Standards (India)
        lessons:
          - slug: in-as-overview
            title:
              en: Indian Accounting Standards Landscape — AS, Ind AS, ICDS
              ar: مشهد المعايير المحاسبية الهندية
            learning_objectives:
              - Distinguish AS, Ind AS, and ICDS and when each applies
              - Identify which class of company follows which framework
          - slug: in-as-key-standards
            title:
              en: The Standards Every Accountant Must Know — AS 1, 2, 9, 10, 22
              ar: المعايير الأساسية التي يجب على كل محاسب معرفتها
            learning_objectives:
              - Summarise AS 1 (disclosure), AS 2 (inventory), AS 9 (revenue), AS 10 (PPE), AS 22 (deferred tax)
              - Apply each standard to a typical SME transaction
          - slug: in-as-ind-as-overview
            title:
              en: Ind AS — When and Why a Company Converts
              ar: نظرة عامة على المعايير الهندية المتقاربة مع IFRS
            learning_objectives:
              - State the Ind AS applicability roadmap (net worth thresholds, listed status)
              - List the top 5 differences between AS and Ind AS

  # ════════════════════════════════════════════════════════════
  - phase: 2
    title:
      en: Core — Books, Tally, and the Trial Balance
      ar: الأساسي — الدفاتر وتالي وميزان المراجعة
    modules:
      - module: Tally Prime Mastery
        lessons:
          - slug: in-tally-what-and-features
            title:
              en: What is Tally Prime and Why It Dominates Indian Accounting
              ar: ما هو تالي برايم
            learning_objectives:
              - List the core features of Tally Prime
              - Explain why 80%+ of Indian SMEs run on Tally
          - slug: in-tally-company-creation
            title:
              en: Creating a Company in Tally Prime — Books Beginning, Financial Year, Features
              ar: إنشاء شركة في تالي برايم
            learning_objectives:
              - Create a new company file with correct statutory settings for India
              - Configure books-beginning date, financial year, and base currency
          - slug: in-tally-groups-and-ledgers
            title:
              en: Groups and Ledgers — Building the Chart of Accounts in Tally
              ar: المجموعات ودفاتر الأستاذ في تالي
            learning_objectives:
              - Differentiate primary groups from sub-groups
              - Create single and multiple ledgers under correct groups
          - slug: in-tally-accounting-vouchers
            title:
              en: Accounting Vouchers in Tally — F4 to F9 Walkthrough
              ar: السندات المحاسبية في تالي
            learning_objectives:
              - Use each accounting voucher (Contra F4, Payment F5, Receipt F6, Journal F7, Sales F8, Purchase F9)
              - Pick the right voucher under pressure
          - slug: in-tally-inventory-vouchers
            title:
              en: Inventory Vouchers in Tally — Stock Items, Units, Godowns
              ar: سندات المخزون في تالي
            learning_objectives:
              - Set up stock items, units of measure, and godowns
              - Record receipt notes, delivery notes, and stock journals

      - module: Journal Entries
        lessons:
          - slug: in-je-meaning-and-format
            title:
              en: Journal Entries — Format, Narration, and Best Practice
              ar: قيود اليومية
            learning_objectives:
              - Write a journal entry with debit, credit, and narration in standard format
              - Explain why narration is non-negotiable
          - slug: in-je-common-entries
            title:
              en: 25 Most Common Journal Entries Every Accountant Sees
              ar: أكثر القيود اليومية شيوعًا
            learning_objectives:
              - Pass entries for sales, purchases, expenses, depreciation, drawings, capital introduction
              - Identify the document trail behind each entry
          - slug: in-je-compound-and-rectification
            title:
              en: Compound Entries and Rectification of Errors
              ar: القيود المركبة وتصحيح الأخطاء
            learning_objectives:
              - Pass compound entries with multiple debits/credits
              - Rectify errors of omission, commission, principle, and compensating errors

      - module: Posting and Ledger
        lessons:
          - slug: in-ledger-posting
            title:
              en: Posting Journal Entries to the General Ledger
              ar: ترحيل قيود اليومية إلى دفتر الأستاذ
            learning_objectives:
              - Post entries from journal to ledger accounts
              - Balance a ledger account at month-end
          - slug: in-ledger-gl-reconciliation
            title:
              en: General Ledger Reconciliation — Process and Pitfalls
              ar: تسوية دفتر الأستاذ العام
            learning_objectives:
              - Reconcile sub-ledgers (AR, AP, inventory) to the general ledger
              - Investigate and resolve reconciling items

      - module: Trial Balance
        lessons:
          - slug: in-tb-purpose-and-format
            title:
              en: Trial Balance — Purpose, Format, and What It Proves
              ar: ميزان المراجعة
            learning_objectives:
              - Prepare a trial balance from ledger balances
              - Explain why a balanced TB does NOT prove correctness
          - slug: in-tb-errors-and-suspense
            title:
              en: Errors That Affect (and Don't Affect) the Trial Balance
              ar: الأخطاء في ميزان المراجعة
            learning_objectives:
              - List errors that don't disturb the TB (omission, principle, compensating)
              - Use a suspense account to balance and resolve

      - module: Adjusting Entries
        lessons:
          - slug: in-adj-purpose-and-types
            title:
              en: Why Adjusting Entries Exist — Accrual Drives Everything
              ar: لماذا توجد قيود التسوية
            learning_objectives:
              - Explain how accrual accounting forces adjustments
              - Categorise adjustments into accruals, deferrals, estimates
          - slug: in-adj-accrued-income-expense
            title:
              en: Accrued Income and Accrued Expenses
              ar: الإيرادات والمصروفات المستحقة
            learning_objectives:
              - Pass entries for income earned but not received
              - Pass entries for expenses incurred but not paid
          - slug: in-adj-deferred-prepaid
            title:
              en: Deferred Income and Prepaid Expenses
              ar: الإيرادات المؤجلة والمصروفات المدفوعة مقدمًا
            learning_objectives:
              - Distinguish liability method from income method for unearned revenue
              - Pass and reverse prepayment entries
          - slug: in-adj-depreciation
            title:
              en: Depreciation — Concept, Methods (SLM, WDV) and Companies Act vs IT Act
              ar: الإهلاك — المفهوم والطرق
            learning_objectives:
              - Compute depreciation under SLM and WDV
              - Reconcile depreciation per Companies Act Schedule II vs Income Tax Act
          - slug: in-adj-bad-debts
            title:
              en: Bad Debts and Provision for Doubtful Debts
              ar: الديون المعدومة والمخصصات
            learning_objectives:
              - Pass entries for direct write-off and provision approach
              - Decide which approach the business should use

      - module: Inventory Valuation
        lessons:
          - slug: in-inv-what-is-inventory
            title:
              en: What Counts as Inventory — Raw Materials, WIP, Finished Goods
              ar: ما هو المخزون
            learning_objectives:
              - Classify items into raw material, WIP, finished goods, stores
              - Identify items that are NOT inventory (capital goods)
          - slug: in-inv-fifo-lifo-wac
            title:
              en: FIFO, LIFO and Weighted Average — Methods and Tax Impact
              ar: طرق تقييم المخزون
            learning_objectives:
              - Compute closing stock under all three methods on the same data
              - Explain why LIFO is not permitted under Ind AS / AS 2
          - slug: in-inv-as2-lower-of-cost-nrv
            title:
              en: AS 2 / Ind AS 2 — Lower of Cost or Net Realisable Value
              ar: المعيار 2 — التكلفة أو صافي القيمة القابلة للتحقق أيهما أقل
            learning_objectives:
              - Apply the lower-of-cost-or-NRV rule item by item
              - Pass write-down entries

      - module: Bank Reconciliation
        lessons:
          - slug: in-brs-introduction
            title:
              en: Why Bank Books and Pass Books Disagree
              ar: لماذا تختلف الدفاتر المصرفية
            learning_objectives:
              - List the five common reasons for disagreement
              - Explain timing differences vs errors
          - slug: in-brs-preparation
            title:
              en: Preparing a Bank Reconciliation Statement Step by Step
              ar: إعداد بيان التسوية المصرفية
            learning_objectives:
              - Start from cash book balance and arrive at pass book balance (and vice versa)
              - Identify items needing book correction vs items that auto-resolve
          - slug: in-brs-tally-bank-recon
            title:
              en: Bank Reconciliation in Tally Prime
              ar: التسوية المصرفية في تالي
            learning_objectives:
              - Use Tally's BRS feature with bank statement import
              - Resolve unreconciled items inside Tally

  # ════════════════════════════════════════════════════════════
  - phase: 3
    title:
      en: Compliance — Tax, GST, TDS, TCS, Payroll
      ar: الامتثال — الضرائب وضريبة السلع والخدمات وخصم الضريبة من المنبع وكشوف الرواتب
    modules:
      - module: Indian Taxation Foundations
        lessons:
          - slug: in-tax-direct-vs-indirect
            title:
              en: Direct vs Indirect Tax — The Indian Tax Map
              ar: الضرائب المباشرة وغير المباشرة في الهند
            learning_objectives:
              - Distinguish direct from indirect taxes with examples
              - Map each tax to the authority that collects it
          - slug: in-tax-residential-status
            title:
              en: Residential Status and Scope of Total Income
              ar: حالة الإقامة الضريبية
            learning_objectives:
              - Determine residential status (ROR, RNOR, NR) using day-count tests
              - Map residential status to scope of taxable income
          - slug: in-tax-five-heads
            title:
              en: The Five Heads of Income — A Tour
              ar: رؤوس الدخل الخمسة
            learning_objectives:
              - Name the five heads and what falls under each
              - Pick the right head for ambiguous income
          - slug: in-tax-salary-income
            title:
              en: Income from Salary — Components, Allowances, Perquisites
              ar: الدخل من الرواتب
            learning_objectives:
              - Compute taxable salary including HRA, LTA, perquisites
              - Apply standard deduction and claim exemptions
          - slug: in-tax-house-property
            title:
              en: Income from House Property — Self-Occupied, Let-Out, Deemed Let-Out
              ar: الدخل من الممتلكات المنزلية
            learning_objectives:
              - Compute annual value, deductions u/s 24, and net taxable income
              - Apply interest cap on self-occupied property
          - slug: in-tax-pgbp
            title:
              en: Profits and Gains from Business or Profession (PGBP)
              ar: الأرباح والمكاسب من الأعمال أو المهنة
            learning_objectives:
              - List allowable and disallowable expenses under PGBP
              - Apply Section 40A(3), 43B, presumptive taxation u/s 44AD/44ADA
          - slug: in-tax-capital-gains
            title:
              en: Capital Gains — STCG, LTCG, Indexation, Exemptions
              ar: مكاسب رأس المال
            learning_objectives:
              - Distinguish STCG vs LTCG by asset class and holding period
              - Apply indexation and exemptions u/s 54, 54F, 54EC
          - slug: in-tax-other-sources
            title:
              en: Income from Other Sources
              ar: الدخل من مصادر أخرى
            learning_objectives:
              - List items taxable under "other sources"
              - Apply gift taxation rules u/s 56(2)(x)
          - slug: in-tax-deductions-80c-onwards
            title:
              en: Chapter VI-A Deductions — 80C, 80D, 80G and the Rest
              ar: خصومات الفصل السادس أ
            learning_objectives:
              - Use 80C, 80CCD, 80D, 80E, 80G, 80TTA effectively
              - Compare old vs new tax regime for a sample taxpayer
          - slug: in-tax-advance-tax
            title:
              en: Advance Tax — Instalments, Interest u/s 234B/C
              ar: الضريبة المقدمة
            learning_objectives:
              - Calculate advance tax instalments and due dates
              - Compute interest under 234A/B/C

      - module: TDS (Tax Deducted at Source)
        lessons:
          - slug: in-tds-objective-and-mechanism
            title:
              en: TDS — Why It Exists and How It Works
              ar: خصم الضريبة من المنبع
            learning_objectives:
              - Explain the TDS mechanism and its role in tax collection
              - Identify deductor, deductee, and the section that applies
          - slug: in-tds-key-sections
            title:
              en: Key TDS Sections — 192, 194A, 194C, 194H, 194I, 194J, 194Q, 195
              ar: الأقسام الرئيسية لخصم الضريبة من المنبع
            learning_objectives:
              - Match each section to the type of payment it covers
              - Apply correct rate and threshold for each section
          - slug: in-tds-non-compliance
            title:
              en: Consequences of Non-Compliance — Disallowance, Interest, Penalty
              ar: عواقب عدم الامتثال
            learning_objectives:
              - Explain Section 40(a)(ia) disallowance
              - Compute interest u/s 201(1A) for late deduction/payment
          - slug: in-tds-certificates-and-returns
            title:
              en: TDS Certificates (Form 16, 16A) and Returns (24Q, 26Q, 27Q)
              ar: شهادات وإقرارات خصم الضريبة من المنبع
            learning_objectives:
              - Match each form to its purpose
              - Walk through TRACES portal for download/correction
          - slug: in-tds-in-tally
            title:
              en: TDS Setup and Recording in Tally Prime
              ar: إعداد TDS في تالي
            learning_objectives:
              - Enable TDS, configure nature of payment, and pass entries
              - Generate TDS payable report in Tally

      - module: TCS (Tax Collected at Source)
        lessons:
          - slug: in-tcs-overview
            title:
              en: TCS — When the Seller Collects Tax
              ar: ضريبة محصلة من المنبع
            learning_objectives:
              - Distinguish TCS from TDS
              - List the goods/services and thresholds covered under Section 206C
          - slug: in-tcs-tally-and-entries
            title:
              en: TCS in Tally — Setup, Entries, and Returns
              ar: TCS في تالي
            learning_objectives:
              - Enable TCS in Tally and create TCS-applicable ledgers
              - Pass sale entries with TCS and generate the TCS report

      - module: GST End-to-End
        lessons:
          - slug: in-gst-introduction-and-benefits
            title:
              en: GST — One Nation, One Tax (Why GST Replaced VAT/Excise/Service Tax)
              ar: مقدمة في ضريبة السلع والخدمات
            learning_objectives:
              - State the four key benefits of GST over the legacy regime
              - Explain the dual GST model (Centre + State)
          - slug: in-gst-terminology-and-design
            title:
              en: GST Terminology and Design — Supply, Levy, Registration Threshold
              ar: مصطلحات GST وتصميمها
            learning_objectives:
              - Define supply, taxable person, aggregate turnover
              - State the registration threshold for goods vs services and special category states
          - slug: in-gst-types-cgst-sgst-igst-utgst
            title:
              en: CGST, SGST, IGST, UTGST — Which One Applies?
              ar: أنواع GST
            learning_objectives:
              - Pick the correct GST type for a given supply
              - Apply place-of-supply rules to inter-state vs intra-state
          - slug: in-gst-place-of-supply
            title:
              en: Place of Supply Rules for Goods and Services
              ar: مكان التوريد بموجب GST
            learning_objectives:
              - Apply place-of-supply rules for B2B, B2C, services, e-commerce
              - Resolve common edge cases (transportation, telecom, OIDAR)
          - slug: in-gst-time-and-value-of-supply
            title:
              en: Time of Supply and Value of Supply
              ar: وقت وقيمة التوريد
            learning_objectives:
              - Determine time of supply for goods, services, and reverse charge
              - Compute taxable value including/excluding discounts and incidental expenses
          - slug: in-gst-rates-and-hsn-sac
            title:
              en: GST Rate Slabs and HSN / SAC Classification
              ar: شرائح GST وتصنيف HSN/SAC
            learning_objectives:
              - List the rate slabs (0, 5, 12, 18, 28%) and special rates
              - Look up HSN for goods and SAC for services
          - slug: in-gst-input-tax-credit
            title:
              en: Input Tax Credit — Eligibility, Conditions, Blocked Credits
              ar: ائتمان ضريبة المدخلات
            learning_objectives:
              - Apply the four conditions for ITC eligibility
              - Identify blocked credits under Section 17(5)
          - slug: in-gst-rcm
            title:
              en: Reverse Charge Mechanism — When the Buyer Pays GST
              ar: آلية الشحن العكسي
            learning_objectives:
              - List notified RCM supplies (legal, GTA, director services, import of services)
              - Pass RCM entries and claim corresponding ITC
          - slug: in-gst-composition-scheme
            title:
              en: Composition Scheme — When and Why a Small Business Opts In
              ar: مخطط التركيب
            learning_objectives:
              - State eligibility, rates, and restrictions of the composition scheme
              - Compare effective tax cost vs regular scheme for a sample
          - slug: in-gst-registration
            title:
              en: GST Registration — Who, When, and How (GST Portal Walkthrough)
              ar: التسجيل في GST
            learning_objectives:
              - Determine mandatory vs voluntary registration
              - Decode the 15-digit GSTIN structure
          - slug: in-gst-invoice-and-bill-of-supply
            title:
              en: Tax Invoice, Bill of Supply, Receipt Voucher and Refund Voucher
              ar: الفاتورة الضريبية وفاتورة التوريد
            learning_objectives:
              - List mandatory fields on a tax invoice
              - Pick the right document type for any transaction
          - slug: in-gst-eway-bill
            title:
              en: E-Way Bill — When Required, How to Generate, Penalties
              ar: فاتورة الطريق الإلكترونية
            learning_objectives:
              - Identify when an e-way bill is mandatory (₹50,000 threshold and exceptions)
              - Generate and update an e-way bill on the portal
          - slug: in-gst-e-invoicing
            title:
              en: E-Invoicing under GST — IRN, QR Code, IRP Portal
              ar: الفوترة الإلكترونية تحت GST
            learning_objectives:
              - State current e-invoicing turnover threshold and exclusions
              - Walk through IRN generation and QR code on the invoice
          - slug: in-gst-returns-gstr1
            title:
              en: GSTR-1 — Outward Supplies Return
              ar: GSTR-1
            learning_objectives:
              - Map invoice data to GSTR-1 tables
              - File GSTR-1 monthly vs quarterly under QRMP
          - slug: in-gst-returns-gstr3b
            title:
              en: GSTR-3B — The Self-Assessed Monthly Return
              ar: GSTR-3B
            learning_objectives:
              - Reconcile GSTR-3B with books and GSTR-1
              - Pay tax through the electronic cash and credit ledgers
          - slug: in-gst-returns-gstr2a-2b
            title:
              en: GSTR-2A vs GSTR-2B — Reading the Auto-Drafted ITC Statements
              ar: GSTR-2A و GSTR-2B
            learning_objectives:
              - Distinguish GSTR-2A from GSTR-2B
              - Reconcile purchase register with 2B and resolve mismatches
          - slug: in-gst-annual-return-gstr9
            title:
              en: GSTR-9 and GSTR-9C — Annual Return and Reconciliation Statement
              ar: GSTR-9 و GSTR-9C
            learning_objectives:
              - Identify who must file GSTR-9 and 9C
              - Walk through key tables and common errors
          - slug: in-gst-payment-and-refunds
            title:
              en: GST Payment, Cash Ledger, Credit Ledger, and Refund Process
              ar: الدفع والمبالغ المستردة في GST
            learning_objectives:
