          - slug: in-gst-audit-by-department
            title:
              en: Departmental GST Audit — How to Prepare and What to Expect
              ar: تدقيق GST من قبل المصلحة
            learning_objectives:
              - Prepare a departmental audit file (sales, purchase, ITC, returns)
