              ar: الصادرات بموجب GST
            learning_objectives:
              - Distinguish export with payment of IGST vs export under LUT
              - File LUT and claim refund of accumulated ITC
          - slug: in-gst-job-work
            title:
              en: Job Work under GST — ITC-04 and Movement Without Tax
              ar: العمل المقاولي بموجب GST
            learning_objectives:
              - Send goods on job work without payment of tax
              - File ITC-04 and reconcile job-work stock
          - slug: in-gst-tds-tcs-under-gst
