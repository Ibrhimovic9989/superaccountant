name: Deploy API to Azure

# Keeps the Azure VM API in lockstep with main. Without this, Vercel
# auto-deploys the web app but the Azure API drifts behind — which is
# how the 2026-05-25 masterclass outage happened (deployed API was
# 166 files / 20k lines behind main, missing CORS + the new
# /entry-test/start route).

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - 'packages/config/**'
      - 'packages/ai/**'
      - 'packages/email/**'
      - 'packages/types/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'infra/azure/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: {} # allow manual re-runs from the Actions tab

concurrency:
  group: deploy-api
  cancel-in-progress: false # never cancel a deploy mid-flight

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AZURE_HOST: superaccountant-api.eastus.cloudapp.azure.com
      SSH_KEY: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}

    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$AZURE_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "✓ SSH key installed"

      - name: Pull, install, restart API
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
              azureuser@"$AZURE_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd ~/superaccountant
          echo "▸ git pull"
          git pull --ff-only
          echo "▸ pnpm install"
          pnpm install --frozen-lockfile=false
          echo "▸ regenerate prisma client"
          pnpm --filter @sa/db generate || true
          echo "▸ restart systemd service"
          sudo systemctl restart superaccountant-api
          sleep 3
          sudo systemctl status superaccountant-api --no-pager -l | head -n 15
          REMOTE

      - name: Verify /health (5 attempts)
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 5 "https://$AZURE_HOST/health" > /tmp/health.json; then
              echo "✓ /health responded:"
              cat /tmp/health.json
              exit 0
            fi
            echo "  attempt $i: not ready yet, waiting 3s..."
            sleep 3
          done
          echo "✗ /health never returned 200 after restart — check systemctl logs"
          exit 1

      - name: Verify CORS preflight
        run: |
          PREFLIGHT=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 \
            -X OPTIONS \
            -H 'Origin: https://app.superaccountant.in' \
            -H 'Access-Control-Request-Method: POST' \
            "https://$AZURE_HOST/entry-test/start")
          if [ "$PREFLIGHT" = "204" ]; then
            echo "✓ CORS preflight returned 204"
          else
            echo "✗ CORS preflight returned $PREFLIGHT (expected 204) — main.ts CORS config may be broken"
            exit 1
          fi
