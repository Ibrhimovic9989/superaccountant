#
# nginx reverse proxy for the SuperAccountant API.
# Forwards HTTPS traffic on the public hostname to NestJS on 127.0.0.1:4000.
# Certbot will inject the SSL block on first run.
#
# __DOMAIN__ is replaced by bootstrap-vm.sh with the actual FQDN.
#

upstream superaccountant_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Buffers tuned for SSE — the tutor /ask endpoint streams chunks for
    # potentially several seconds. Disable nginx response buffering on it
    # via the X-Accel-Buffering header which the controller already sets.
    client_max_body_size 10M;
    client_body_timeout 120s;

    # Proxy everything to the API.
    location / {
        proxy_pass http://superaccountant_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        # SSE-friendly timeouts. /tutor/ask can stream for minutes if a long
        # answer is being generated. Bump these well past defaults.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check — bypass logs to keep journald clean.
    location = /health {
        access_log off;
        proxy_pass http://superaccountant_api/health;
    }
}
